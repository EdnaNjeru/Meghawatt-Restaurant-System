<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meghawatt Admin | Kitchen Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f2f6; margin: 0; padding: 20px; }
        header { background-color: #003366; color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; color: #4b5563; }
        .inventory-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
        .inventory-card { background: white; padding: 16px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; gap: 12px; }
        .inventory-card strong { display: block; margin-bottom: 4px; }
        .inventory-card small { color: #6b7280; }
        .inventory-card input { width: 18px; height: 18px; accent-color: #27ae60; }
        .status-badge { font-size: 0.8rem; color: #27ae60; font-weight: 700; }
        .status-badge.out { color: #c0392b; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 24px; }
        .order-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #d4af37; }
        .order-header { display: flex; justify-content: space-between; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 10px; }
        .location-badge { background-color: #e3f2fd; color: #0d47a1; padding: 5px 10px; border-radius: 4px; font-size: 0.85rem; font-weight: 600; margin-top: 10px; display: inline-block; }
        .complete-btn { width: 100%; background-color: #27ae60; color: white; border: none; padding: 10px; border-radius: 5px; margin-top: 15px; cursor: pointer; font-weight: 600; }
        .complete-btn:hover { background-color: #219150; }
        .no-orders { text-align: center; color: #747d8c; grid-column: 1 / -1; padding: 5px; font-size: 1.2rem; }
        .refresh-btn { background: white; color: #003366; border: none; padding: 10px 15px; font-weight: bold; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1>Meghawatt Restaurant — Kitchen Live Orders</h1>
        <button onclick="loadOrders()" class="refresh-btn">🔄 Refresh Orders</button>
    </header>

    <div class="toolbar">
        <p>Toggle an item to mark it unavailable for customers.</p>
        <span id="inventory-summary">Loading stock...</span>
    </div>

    <div id="inventory-list" class="inventory-list"></div>

    <div class="dashboard-grid" id="admin-orders-container"></div>

    <script src="admin.js"></script>
</body>
</html>
